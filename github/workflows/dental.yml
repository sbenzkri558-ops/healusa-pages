name: HealUSA Dental SEO Agent

on:
  schedule:
    - cron: '*/30 * * * *'   # Every 30 minutes
  workflow_dispatch:           # Manual trigger

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout healusa-pages repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          repository: ${{ secrets.HEALUSA_PAGES_REPO }}
          path: healusa-pages

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests cryptography

      - name: Download agent_dental.py
        run: |
          curl -H "Authorization: token ${{ secrets.GH_TOKEN }}" \
               -H "Accept: application/vnd.github.v3.raw" \
               -o agent_dental.py \
               "https://api.github.com/repos/${{ github.repository }}/contents/agent_dental.py"

      - name: Run agent
        env:
          GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_2:        ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3:        ${{ secrets.GROQ_API_KEY_3 }}
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2:      ${{ secrets.GEMINI_API_KEY_2 }}
          GH_TOKEN:              ${{ secrets.GH_TOKEN }}
          HEALUSA_PAGES_REPO:    ${{ secrets.HEALUSA_PAGES_REPO }}
          HEALUSA_SITE_URL:      ${{ secrets.HEALUSA_SITE_URL }}
          BING_INDEXNOW_KEY:             ${{ secrets.BING_INDEXNOW_KEY }}
          GOOGLE_SERVICE_ACCOUNT_KEY:    ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
        run: |
          cd healusa-pages
          python ../agent_dental.py
